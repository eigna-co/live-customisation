const CONFIG = {
  // Airtable credentials are now server-side in the Netlify function — not here
  SMS_TEMPLATE: (firstName, gift, decoration, ticket) =>
    `Hey ${firstName} — your ${gift} with "${decoration}" is ready at the booth. Show ticket ${ticket} within 30 min.`,
  STAFF_PASSWORD: 'staff123',
  CONTACT_FORM_URL: 'https://airtable.com/appdvB1aUSC8Q0Z2T/pagDaSkn5Er5Lcuuq/form',
};

async function airtableProxy({ method = 'GET', query, body }) {
  const res = await fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method, query, body }),
  });
  return res.json();
}

async function checkEmailExists(email) {
  const formula = encodeURIComponent(`{Email}="${email}"`);
  const json = await airtableProxy({ query: `filterByFormula=${formula}` });
  return (json.records?.length ?? 0) > 0;
}

async function submitToAirtable(fields) {
  const json = await airtableProxy({ method: 'POST', body: { fields } });
  if (json.error) throw new Error('Submission failed');
}

function Tag({ children, style = {} }) {
  return (
    <span style={{
      fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 1.4,
      textTransform: 'uppercase', color: 'var(--accent)',
      padding: '5px 8px', border: '1px solid var(--accent)',
      borderRadius: 3, ...style,
    }}>{children}</span>
  );
}

function Btn({ children, onClick, disabled, variant = 'primary', style = {} }) {
  const base = {
    width: '100%', height: 54, borderRadius: 999, border: 'none',
    fontFamily: 'var(--display)', fontWeight: 600, fontSize: 15,
    letterSpacing: 0.6, textTransform: 'uppercase',
    cursor: disabled ? 'not-allowed' : 'pointer',
    transition: 'transform .12s ease, opacity .12s ease',
    opacity: disabled ? 0.4 : 1,
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
  };
  const variants = {
    primary: { background: 'var(--accent)', color: '#0a0a0a' },
    ghost:   { background: 'transparent', color: 'var(--fg)', border: '1px solid var(--line)' },
    dark:    { background: 'var(--fg)', color: 'var(--bg)' },
  };
  return (
    <button disabled={disabled} onClick={onClick}
      onMouseDown={e => !disabled && (e.currentTarget.style.transform = 'scale(0.98)')}
      onMouseUp={e => (e.currentTarget.style.transform = 'scale(1)')}
      onMouseLeave={e => (e.currentTarget.style.transform = 'scale(1)')}
      style={{ ...base, ...variants[variant], ...style }}>
      {children}
    </button>
  );
}

function Field({ label, value, onChange, placeholder, type = 'text', hint, hintError, optional, maxLength, rightAdornment }) {
  const [focused, setFocused] = useState(false);
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
        <label style={{
          fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 1.5,
          textTransform: 'uppercase', color: 'var(--fg-dim)',
        }}>
          {label} {optional && <span style={{ opacity: 0.55 }}>— optional</span>}
        </label>
        {maxLength && (
          <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--fg-dim)' }}>
            {value.length}/{maxLength}
          </span>
        )}
      </div>
      <div style={{
        position: 'relative',
        borderBottom: `1px solid ${focused ? 'var(--accent)' : 'var(--line)'}`,
        transition: 'border-color .2s',
      }}>
        <input
          type={type} value={value} onChange={e => onChange(e.target.value)}
          placeholder={placeholder} maxLength={maxLength}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          style={{
            width: '100%', border: 'none', outline: 'none', background: 'transparent',
            color: 'var(--fg)', fontFamily: 'var(--display)', fontSize: 18, fontWeight: 500,
            padding: '8px 0', letterSpacing: -0.1,
          }}
        />
        {rightAdornment && <div style={{ position: 'absolute', right: 0, top: 8 }}>{rightAdornment}</div>}
      </div>
      {hint && (
        <div style={{ marginTop: 6, fontFamily: 'var(--body)', fontSize: 12, color: hintError ? 'var(--accent)' : 'var(--fg-dim)' }}>{hint}</div>
      )}
    </div>
  );
}

function GiftIllustration({ type, name = '' }) {
  // ── IMAGE PATHS ──────────────────────────────────────────────
  // Save your images into an `images/` folder in the same repo:
  //   images/tumbler.jpg   ← Coffee Tumbler
  //   images/notebook.jpg  ← Notebook
  //   images/card.jpg      ← NETS Prepaid Card
  const imgs = {
    mug:      'images/tumbler.png',
    notebook: 'images/notebook.png',
    card:     'images/card.png',
  };
  // Show decoration label only for text personalisation (not sticker IDs)
  const showLabel = name && !name.startsWith('sticker-');

  // Tumbler: engraving overlay — centered on cup body, debossed look
  const engravingOverlay = showLabel && type === 'mug' && (
    <div style={{
      position: 'absolute', top: '50%', left: '50%',
      transform: 'translate(-50%, -50%)',
      fontFamily: 'var(--body)', fontSize: 11, fontWeight: 400,
      letterSpacing: 0.8, textTransform: 'uppercase',

      pointerEvents: 'none', whiteSpace: 'nowrap',
      mixBlendMode: 'screen',
    }}>
      {name.toUpperCase()}
    </div>
  );

  // Other gifts: accent bar at bottom
  const barOverlay = showLabel && type !== 'mug' && (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      padding: '10px 14px',

      color: 'var(--accent)', letterSpacing: 2, textAlign: 'center',
      textTransform: 'uppercase',

  );

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', background: '#fff', overflow: 'hidden' }}>
      <img
        src={imgs[type]}
        alt={type}
        style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block' }}
      />
      {engravingOverlay}
      {barOverlay}
    </div>
  );
}

function WelcomeScreen({ onStart, eventName, venue, lineCopy, onStaffTap, mobile }) {
  const tapRef = useRef({ count: 0, timer: null });
  const handleLiveTap = () => {
    tapRef.current.count++;
    clearTimeout(tapRef.current.timer);
    tapRef.current.timer = setTimeout(() => { tapRef.current.count = 0; }, 1000);
    if (tapRef.current.count >= 3) {
      tapRef.current.count = 0;
      onStaffTap && onStaffTap();
    }
  };
  return (
    <div style={{
      height: '100%', display: 'flex', flexDirection: 'column',
      boxSizing: 'border-box', padding: mobile ? '24px 20px 20px' : '40px 24px 24px', position: 'relative', overflow: 'hidden',
    }}>

function DetailsScreen({ data, setData, onNext, onBack, mobile }) {
  const [checking, setChecking] = useState(false);
  const [emailError, setEmailError] = useState('');
  const emailCache = useRef({});

  const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email);
  const validPhone = /^\+65[89]\d{7}$/.test(data.phone.replace(/[\s-]/g, ''));
  const valid =
    data.name.trim().length > 0 &&
    data.company.trim().length > 0 &&
    validEmail &&
    validPhone;

  // Silently pre-check email as user types (debounced 800ms)
  useEffect(() => {
    if (!validEmail) return;
    const timer = setTimeout(async () => {
      if (emailCache.current[data.email] !== undefined) return; // already cached
      try {
        const exists = await checkEmailExists(data.email);
        emailCache.current[data.email] = exists;
        if (exists) setEmailError('This email has already been used for a redemption.');
      } catch { /* silent fail — will retry on Next */ }
    }, 800);
    return () => clearTimeout(timer);
  }, [data.email, validEmail]);

  const handleNext = async () => {
    setEmailError('');
    // Use cached result if available
    if (emailCache.current[data.email] !== undefined) {
      if (emailCache.current[data.email]) {
        setEmailError('This email has already been used for a redemption.');
        return;
      }
      onNext();
      return;
    }
    // Fallback: live check
    setChecking(true);
    try {
      const exists = await checkEmailExists(data.email);
      emailCache.current[data.email] = exists;
      if (exists) {
        setEmailError('This email has already been used for a redemption.');
      } else {
        onNext();
      }
    } catch {
      setEmailError('Could not verify. Please check your connection and try again.');
    }
    setChecking(false);
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', boxSizing: 'border-box', padding: mobile ? '24px 20px 20px' : '40px 24px 24px' }}>
      <StepHeader
        step={1} total={4} onBack={onBack}
        title="Your details."
        subtitle="We'll send you an SMS notification when it's ready to collect."
      />
      <div style={{ flex: 1, overflowY: 'auto', margin: mobile ? '0 -20px' : '0 -24px', padding: mobile ? '0 20px 20px' : '0 24px 20px' }}>
        <Field label="Full name" value={data.name} onChange={v => setData({ ...data, name: v })} placeholder="Jane Tan"/>
        <Field label="Company" value={data.company} onChange={v => setData({ ...data, company: v })} placeholder="e.g. Hypebeast SG"/>
        <Field
          label="Company email" value={data.email} onChange={v => { setData({ ...data, email: v }); setEmailError(''); }}
          placeholder="you@company.com" type="email"
          hint={emailError || 'One redemption per email address.'}
          hintError={!!emailError}
        />
        <Field
          label="Mobile"
          value={data.phone} onChange={v => setData({ ...data, phone: v })}
          placeholder="+65 9123 4567" type="tel"
          hint={data.phone && !validPhone ? 'Enter a valid SG mobile number, e.g. +6591234567' : "We'll SMS you here when your gift is ready."}
        />
        <ConsentRow />
      </div>
      <Btn onClick={handleNext} disabled={!valid || checking} style={{ flexShrink: 0 }}>
        Next →
      </Btn>
    </div>
  );
}

function StaffPanel({ open, onClose, gifts, soldOut, setSoldOut }) {
  const [authed, setAuthed] = useState(false);
  const [pwInput, setPwInput] = useState('');
  const [pwError, setPwError] = useState('');

  // Reset auth state when panel closes
  useEffect(() => {
    if (!open) { setAuthed(false); setPwInput(''); setPwError(''); }
  }, [open]);

  if (!open) return null;

  const handleAuth = () => {
    if (pwInput === CONFIG.STAFF_PASSWORD) {
      setAuthed(true);
      setPwError('');
    } else {
      setPwError('Incorrect password.');
      setPwInput('');
    }
  };

  const toggle = (id) => {
    setSoldOut(prev => ({ ...prev, [id]: !prev[id] }));
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 9999,
      background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }} onClick={onClose}>
      <div style={{
        background: '#111', border: '1px solid #2a2a2a', borderRadius: 18,
        padding: 24, width: 300, boxShadow: '0 24px 60px rgba(0,0,0,0.6)',
        fontFamily: 'JetBrains Mono, monospace',
      }} onClick={e => e.stopPropagation()}>
        {/* header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div style={{ fontSize: 11, letterSpacing: 1.5, color: '#888', textTransform: 'uppercase' }}>Staff · Sold Out</div>
          <button onClick={onClose} style={{
            background: 'none', border: 'none', color: '#666', fontSize: 20,
            cursor: 'pointer', lineHeight: 1, padding: 0,
          }}>×</button>
        </div>

        {!authed ? (
          /* password gate */
          <div>
            <div style={{ fontSize: 10, color: '#666', letterSpacing: 1.2, marginBottom: 8, textTransform: 'uppercase' }}>Password</div>
            <input
              type="password" value={pwInput}
              onChange={e => setPwInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleAuth()}
              autoFocus
              style={{
                width: '100%', boxSizing: 'border-box',
                background: '#0a0a0a', border: '1px solid #2a2a2a',
                color: '#fff', padding: '9px 10px', borderRadius: 6,
                fontSize: 14, fontFamily: 'inherit', outline: 'none', marginBottom: 8,
              }}
            />
            {pwError && <div style={{ fontSize: 10, color: '#ff4d4d', letterSpacing: 1, marginBottom: 8 }}>{pwError}</div>}
            <button onClick={handleAuth} style={{
              width: '100%', padding: '10px 0', background: '#d4ff3a', color: '#0a0a0a',
              border: 'none', borderRadius: 8, cursor: 'pointer',
              fontFamily: 'inherit', fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase', fontWeight: 700,
            }}>Unlock</button>
          </div>
        ) : (
          /* sold-out toggles */
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {gifts.map(g => (
              <div key={g.id} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '12px 14px', background: '#1a1a1a', borderRadius: 10,
                border: `1px solid ${soldOut[g.id] ? '#ff4d2e44' : '#2a2a2a'}`,
              }}>
                <div style={{ fontSize: 12, color: soldOut[g.id] ? '#ff4d2e' : '#ccc', letterSpacing: 0.5, fontVariant: 'small-caps' }}>
                  {g.name}
                </div>
                <button onClick={() => toggle(g.id)} style={{
                  fontSize: 10, padding: '5px 10px', borderRadius: 4, cursor: 'pointer',
                  background: soldOut[g.id] ? '#ff4d2e' : '#2a2a2a',
                  color: soldOut[g.id] ? '#fff' : '#888',
                  border: 'none', fontFamily: 'inherit', letterSpacing: 1, textTransform: 'uppercase',
                }}>
                  {soldOut[g.id] ? 'Sold out' : 'In stock'}
                </button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

      transition: 'width .2s',
    }}>
      <button onClick={() => setOpen(!open)} style={{
        width: '100%', background: '#1a1a1a', border: 'none', color: '#fff',
        padding: '10px 14px', textAlign: 'left', cursor: 'pointer',
        fontFamily: 'inherit', fontSize: 11, letterSpacing: 1.5,
        textTransform: 'uppercase', display: 'flex',
        justifyContent: 'space-between', alignItems: 'center',
      }}>
        <span>{open ? 'Tweaks' : '⚙'}</span>
        {open && <span style={{ opacity: 0.5 }}>−</span>}
      </button>
      {open && (
        <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <TSection label="Style">
            <Chips value={tweaks.style} options={[
              { v: 'neon', l: 'Neon' }, { v: 'acid', l: 'Acid' },
              { v: 'cream', l: 'Cream' }, { v: 'mono', l: 'Mono' },
            ]} onChange={v => setTweak({ style: v })} />
          </TSection>
          <TSection label="Accent">
            <div style={{ display: 'flex', gap: 6 }}>
              {['#d4ff3a', '#ff4d2e', '#00e5ff', '#ff2ea8', '#ffffff'].map(c => (
                <button key={c} onClick={() => setTweak({ accent: c })} style={{
                  width: 28, height: 28, borderRadius: 6, cursor: 'pointer',
                  background: c, border: tweaks.accent === c ? '2px solid #fff' : '1px solid #333',
                }} />
              ))}
            </div>
          </TSection>
          <TSection label="Inventory">
            <Chips value={tweaks.showInventory ? 'on' : 'off'} options={[
              { v: 'on', l: 'Visible' }, { v: 'off', l: 'Hidden' },
            ]} onChange={v => setTweak({ showInventory: v === 'on' })} />
          </TSection>
          <TSection label="Event name">
            <input value={tweaks.eventName} onChange={e => setTweak({ eventName: e.target.value })} style={inputStyle}/>
          </TSection>
          <TSection label="Venue">
            <input value={tweaks.venue} onChange={e => setTweak({ venue: e.target.value })} style={inputStyle}/>
          </TSection>
          <TSection label="Low stock threshold">
            <input type="number" value={tweaks.lowStock} onChange={e => setTweak({ lowStock: Number(e.target.value) })} style={inputStyle}/>
          </TSection>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Initial data
// ─────────────────────────────────────────────────────────────

const INITIAL_GIFTS = [
  { id: 'mug',      code: 'CC-001',                  name: 'Coffee Tumbler', blurb: 'Everyday carry. Insulated stainless steel.',   samplePlaceholder: 'CULTURE', remaining: 74 },
  { id: 'notebook', code: 'CC-002',                  name: 'Notebook',       blurb: 'Hardcover geometric. Single-lined.',            samplePlaceholder: 'CARTEL',  remaining: 18,
    stickers: [
      { id: 'sticker-1', name: 'Design 1', img: null },
      { id: 'sticker-2', name: 'Design 2', img: null },
      { id: 'sticker-3', name: 'Design 3', img: null },
    ]
  },
  { id: 'card',     code: 'CC-003',                   name: 'NETS Prepaid Card', blurb: 'For public transport and everyday expenses.', samplePlaceholder: 'YOUR NAME', remaining: 42 },
];

async function makeTicket() {
  // Fetch current record count for sequential number
  let count = 0;
  try {
    let offset = '';
    do {
      const query = 'fields[]=Ticket&pageSize=100' + (offset ? `&offset=${encodeURIComponent(offset)}` : '');
      const json = await airtableProxy({ query });
      count += (json.records?.length ?? 0);
      offset = json.offset || '';
    } while (offset);
  } catch { /* fallback to random if fetch fails */ }

  const letters = Array.from({ length: 2 }, () => String.fromCharCode(65 + Math.floor(Math.random() * 26))).join('');
  const seq = String(count + 1).padStart(3, '0');
  return `CC·${letters}${seq}`;
}

// ─────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────

function App() {
  const [tweaks, setTweaksState] = useState(() => {
    try {
      const saved = localStorage.getItem('lc.tweaks');
      return saved ? { ...window.TWEAK_DEFAULTS, ...JSON.parse(saved) } : window.TWEAK_DEFAULTS;
    } catch { return window.TWEAK_DEFAULTS; }
  });
  const setTweak = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaksState(next);
    localStorage.setItem('lc.tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, [tweaks.accent]);

  const [screenW, setScreenW] = useState(() => window.innerWidth);
  useEffect(() => {
    const handler = () => setScreenW(window.innerWidth);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  const isPhone = screenW <= 600;

  const [tweaksVisible, setTweaksVisible] = useState(false);
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const [step, setStep] = useState(() => Number(localStorage.getItem('lc.step') || 0));
  const [data, setData] = useState(() => {
    try { return JSON.parse(localStorage.getItem('lc.data')) || { name: '', company: '', email: '', phone: '+65' }; }
    catch { return { name: '', company: '', email: '', phone: '+65' }; }
  });
  const [selectedGiftId, setSelectedGiftId] = useState(() => localStorage.getItem('lc.gift') || null);
  const [personalisation, setPersonalisation] = useState(() => localStorage.getItem('lc.pers') || '');
  const [ticket, setTicket] = useState(() => localStorage.getItem('lc.ticket') || '');
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState('');
  const prefetchedTicket = useRef(null);

  // Pre-fetch ticket number when user reaches personalise screen (step 3)
  useEffect(() => {
    if (step === 3) {
      prefetchedTicket.current = null;
      makeTicket().then(t => { prefetchedTicket.current = t; });
    }
  }, [step]);
  const [soldOut, setSoldOut] = useState(() => {
    try { return JSON.parse(localStorage.getItem('lc.soldout')) || {}; }
    catch { return {}; }
  });
  const [staffOpen, setStaffOpen] = useState(false);
  useEffect(() => localStorage.setItem('lc.soldout', JSON.stringify(soldOut)), [soldOut]);

  useEffect(() => localStorage.setItem('lc.step', step), [step]);
  useEffect(() => localStorage.setItem('lc.data', JSON.stringify(data)), [data]);
  useEffect(() => {
    if (selectedGiftId) {
      localStorage.setItem('lc.gift', selectedGiftId);
      setPersonalisation(''); // reset when gift changes
    }
  }, [selectedGiftId]);
  useEffect(() => localStorage.setItem('lc.pers', personalisation), [personalisation]);
  useEffect(() => { if (ticket) localStorage.setItem('lc.ticket', ticket); }, [ticket]);

  const gifts = useMemo(() => INITIAL_GIFTS.map(g => ({
    ...g,
    remaining: soldOut[g.id] ? 0 : g.remaining,
    low: !soldOut[g.id] && g.remaining <= tweaks.lowStock,
  })), [tweaks.lowStock, soldOut]);
  const selectedGift = gifts.find(g => g.id === selectedGiftId);

  const go = (s) => setStep(s);
  const restart = () => {
    ['lc.step','lc.data','lc.gift','lc.pers','lc.ticket'].forEach(k => localStorage.removeItem(k));
    setData({ name: '', company: '', email: '', phone: '+65' });
    setSelectedGiftId(null);
    setPersonalisation('');
    setTicket('');
    setSubmitError('');
    setStep(0);
  };

  const submitRedemption = async () => {
    setSubmitting(true);
    setSubmitError('');
    const t = prefetchedTicket.current ?? await makeTicket();
    try {
      await submitToAirtable({
        Name:       data.name,
        Company:    data.company,
        Email:      data.email,
        Phone:      data.phone,
        Gift:       selectedGift.name.toLowerCase(),
        Decoration: (selectedGift.stickers
          ? (selectedGift.stickers.find(s => s.id === personalisation)?.name ?? personalisation)
          : personalisation).toUpperCase(),
        Ticket:     t,
        Status:     'Queued',
      });
      setTicket(t);
      setStep(4);
    } catch {
      setSubmitError('Submission failed. Please check your connection and try again.');
    }
    setSubmitting(false);
  };

  const screenMap = {
    0: <WelcomeScreen
          eventName={tweaks.eventName} venue={tweaks.venue}
          lineCopy="A complimentary gift to mark Culture Cartel × Wicked Wallop's new partnership. Pick, customise, collect on-site — brought to you by Axxel Marketing."
          onStart={() => go(1)} onStaffTap={() => setStaffOpen(true)} mobile={isPhone} />,
    1: <DetailsScreen data={data} setData={setData} onNext={() => go(2)} onBack={() => go(0)} mobile={isPhone} />,
    2: <GiftPickerScreen gifts={gifts} selected={selectedGiftId} setSelected={setSelectedGiftId}
          showInventory={tweaks.showInventory} onNext={() => go(3)} onBack={() => go(1)} mobile={isPhone} />,
    3: <PersonaliseScreen gift={selectedGift} personalisation={personalisation}
          setPersonalisation={setPersonalisation} onNext={submitRedemption} onBack={() => go(2)}
          submitting={submitting} submitError={submitError} mobile={isPhone} />,
    4: <TicketScreen ticket={ticket} gift={selectedGift} personalisation={personalisation}
          data={data} onCollect={() => go(5)} mobile={isPhone} />,
    5: <DoneScreen data={data} gift={selectedGift} personalisation={personalisation} onRestart={restart} mobile={isPhone} />,
  };

  const showPips = step >= 1 && step <= 3;

  const label = `0${step+1} ${['Welcome','Details','Gift','Personalise','Ticket','Done'][step]}`;
  const pips = showPips ? <div style={{ paddingBottom: isPhone ? 16 : 24 }}><ProgressPips step={step} total={4} /></div>
                        : <div style={{ height: isPhone ? 16 : 24, flexShrink: 0 }} />;
  const panels = <>
    <TweaksPanel tweaks={tweaks} setTweak={setTweak} visible={tweaksVisible} />
    <StaffPanel open={staffOpen} onClose={() => setStaffOpen(false)} gifts={INITIAL_GIFTS} soldOut={soldOut} setSoldOut={setSoldOut} />
  </>;

  return (
    <div data-screen-label={label} className={`style-${tweaks.style}`}
      style={{
        position: 'fixed', inset: 0, zIndex: 10,
        background: isPhone ? 'var(--bg)' : '#0d0d0d',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
      <div style={{
        width: '100%',
        maxWidth: isPhone ? undefined : 480,
        height: isPhone ? '100%' : 'min(860px, calc(100% - 48px))',
        background: 'var(--bg)', color: 'var(--fg)',
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
        borderRadius: isPhone ? 0 : 24,
        boxShadow: isPhone ? 'none' : '0 32px 80px rgba(0,0,0,0.5)',
      }}>
        <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
          <div className="screen" key={step} style={{ position: 'absolute', inset: 0 }}>{screenMap[step]}</div>
        </div>
        {pips}
      </div>
      {panels}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Set --app-height for accurate mobile viewport (excludes browser chrome)
function setAppHeight() {
  document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 100));

// Layout is fully CSS-driven — no scale transform needed
</script>
